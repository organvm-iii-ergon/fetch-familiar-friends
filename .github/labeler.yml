documentation:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.md'
    - docs/**/*
    - ChatPRD/**/*
github:
- changed-files:
  - any-glob-to-any-file:
    - .github/**/*
ci-cd:
- changed-files:
  - any-glob-to-any-file:
    - .github/workflows/**/*
dependencies:
- changed-files:
  - any-glob-to-any-file:
    - package.json
    - package-lock.json
config:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.config.js'
    - '**/*.config.cjs'
    - .eslintrc.cjs
    - tailwind.config.js
    - postcss.config.js
    - vite.config.js
component/calendar:
- changed-files:
  - any-glob-to-any-file:
    - src/components/calendar/**/*
component/social:
- changed-files:
  - any-glob-to-any-file:
    - src/components/social/**/*
component/modals:
- changed-files:
  - any-glob-to-any-file:
    - src/components/modals/**/*
utilities:
- changed-files:
  - any-glob-to-any-file:
    - src/utils/**/*
hooks:
- changed-files:
  - any-glob-to-any-file:
    - src/hooks/**/*
styles:
- changed-files:
  - any-glob-to-any-file:
    - src/styles/**/*
    - '**/*.css'
core:
- changed-files:
  - any-glob-to-any-file:
    - src/App.jsx
    - src/index.jsx
    - src/main.jsx
build:
- changed-files:
  - any-glob-to-any-file:
    - dist/**/*
    - vite.config.js
tests:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.test.js'
    - '**/*.test.jsx'
    - '**/*.spec.js'
    - '**/*.spec.jsx'
security:
- changed-files:
  - any-glob-to-any-file:
    - SECURITY.md
    - .env.example
